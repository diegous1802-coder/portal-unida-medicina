<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portal de Agendamiento · Alumno · UNIDA Medicina</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Arial,sans-serif;background:#f4f6fb;min-height:100vh;color:#1a1a2e;}
.topbar{background:#185FA5;padding:0 24px;display:flex;align-items:center;gap:12px;height:52px;}
.topbar-t{color:#fff;font-size:15px;font-weight:600;}
.topbar-s{color:rgba(255,255,255,.7);font-size:12px;margin-left:auto;}
.wrap{max-width:680px;margin:0 auto;padding:1.5rem 1rem;}
.page-title{font-size:22px;font-weight:700;color:#185FA5;margin-bottom:4px;}
.page-sub{font-size:14px;color:#666;margin-bottom:1.5rem;}
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:2rem;}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;}
.snum{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid #d0d5e8;background:#f4f6fb;color:#aaa;transition:all .3s;}
.snum.active{background:#185FA5;color:#fff;border-color:#185FA5;}
.snum.done{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.slbl{font-size:11px;color:#aaa;white-space:nowrap;}
.slbl.active{color:#185FA5;font-weight:700;}.slbl.done{color:#1D9E75;}
.sline{width:40px;height:2px;background:#e0e4f0;margin-bottom:16px;}
.card{background:#fff;border:1px solid #e8eaf0;border-radius:14px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.section-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ff{grid-column:1/-1;}
.fld{display:flex;flex-direction:column;gap:5px;}
label{font-size:13px;color:#555;font-weight:500;}
input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:10px 12px;border:1.5px solid #dde0eb;border-radius:9px;background:#fff;color:#1a1a2e;outline:none;transition:border .2s;}
input:focus,select:focus,textarea:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.1);}
textarea{min-height:90px;resize:vertical;line-height:1.5;}
.err{font-size:11px;color:#E24B4A;margin-top:2px;display:none;}
.err.show{display:block;}
.doc-tabs{display:flex;gap:8px;margin-bottom:1rem;}
.doc-tab{font-family:inherit;font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;cursor:pointer;border:1.5px solid #dde0eb;background:#f4f6fb;color:#888;transition:all .15s;}
.doc-tab.aj{background:#E6F1FB;color:#0C447C;border-color:#85B7EB;}
.doc-tab.ad{background:#E1F5EE;color:#085041;border-color:#5DCAA5;}
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
.week-lbl{font-size:14px;font-weight:600;color:#1a1a2e;flex:1;text-align:center;}
.btn{font-family:inherit;font-size:13px;font-weight:600;padding:9px 20px;border-radius:9px;cursor:pointer;transition:all .15s;border:1.5px solid #dde0eb;background:transparent;color:#333;}
.btn:hover{background:#f0f2f8;}.btn:active{transform:scale(.98);}.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-icon{padding:8px 12px;}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5;}.btn-primary:hover{background:#0C447C;}
.btn-success{background:#1D9E75;color:#fff;border-color:#1D9E75;}.btn-success:hover{background:#0F6E56;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:1rem;}
.slots-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.day-col{display:flex;flex-direction:column;gap:4px;}
.day-head{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;text-align:center;padding-bottom:5px;border-bottom:2px solid #eee;}
.day-ds{font-size:10px;color:#aaa;text-align:center;margin-bottom:3px;}
.slot-btn{font-family:inherit;font-size:12px;padding:7px 3px;border-radius:7px;cursor:pointer;border:1.5px solid #e0e4f0;background:#f8f9fc;color:#444;text-align:center;width:100%;transition:all .15s;font-weight:600;}
.slot-btn:hover{border-color:#185FA5;background:#E6F1FB;color:#0C447C;}
.slot-btn.sel-j{background:#E6F1FB;color:#0C447C;border-color:#185FA5;}
.slot-btn.sel-d{background:#E1F5EE;color:#085041;border-color:#1D9E75;}
.no-slot{font-size:11px;color:#ccc;text-align:center;padding:6px 0;}
.no-avail{text-align:center;padding:2rem;color:#888;font-size:14px;background:#f8f9fc;border-radius:10px;line-height:1.7;}
.abox{background:#f8f9fc;border-radius:10px;padding:1.25rem;border:1px solid #eef0f7;}
.ameta{display:flex;align-items:center;gap:8px;font-size:12px;color:#888;margin-bottom:8px;}
.dot-a{width:8px;height:8px;border-radius:50%;background:#378ADD;animation:pulse 1s infinite;flex-shrink:0;}
.dot-ok{width:8px;height:8px;border-radius:50%;background:#1D9E75;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.si{background:#f4f6fb;border-radius:9px;padding:10px 12px;}
.sk{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.05em;font-weight:700;}
.sv{font-size:14px;font-weight:600;color:#1a1a2e;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sf{grid-column:1/-1;}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;}
.bj{background:#E6F1FB;color:#0C447C;}.bd{background:#E1F5EE;color:#085041;}
.suc{text-align:center;padding:2.5rem 1rem;}
.suc-icon{width:60px;height:60px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;}
.ref{display:inline-block;background:#E6F1FB;color:#185FA5;font-size:13px;font-weight:700;padding:5px 18px;border-radius:999px;margin:.5rem 0 1rem;}
.spinner{width:32px;height:32px;border:3px solid #e0e4f0;border-top:3px solid #185FA5;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:2.5rem;}
.config-banner{background:#FFF8EC;border:1px solid #F5C660;border-radius:10px;padding:12px 16px;font-size:13px;color:#633806;margin-bottom:1rem;line-height:1.6;}
@media(max-width:500px){.fg{grid-template-columns:1fr}.slots-grid{grid-template-columns:1fr 1fr}.sg{grid-column:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div style="width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm0 3v5l3 3" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
  </div>
  <span class="topbar-t">Portal de Agendamiento · UNIDA Medicina</span>
  <span class="topbar-s">Coordinación Académica</span>
</div>
<div class="wrap">
  <div class="page-title">Solicitar cita</div>
  <div class="page-sub">Coordinación Académica · Carrera de Medicina</div>
  <div class="steps">
    <div class="step"><div class="snum active" id="sn1">1</div><div class="slbl active" id="sl1">Mis datos</div></div>
    <div class="sline"></div>
    <div class="step"><div class="snum" id="sn2">2</div><div class="slbl" id="sl2">Elegir turno</div></div>
    <div class="sline"></div>
    <div class="step"><div class="snum" id="sn3">3</div><div class="slbl" id="sl3">Análisis</div></div>
    <div class="sline"></div>
    <div class="step"><div class="snum" id="sn4">4</div><div class="slbl" id="sl4">Confirmar</div></div>
  </div>
  <div id="sp1"></div><div id="sp2" style="display:none"></div>
  <div id="sp3" style="display:none"></div><div id="sp4" style="display:none"></div>
  <div id="sp5" style="display:none"></div>
</div>
<script>
// ════════════════════════════════════════════════════
// CONFIGURACIÓN — pegá tu URL de Apps Script aquí
// ════════════════════════════════════════════════════
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-3Ps2DWWgUe7J9pefJdCdMcLEETHowBOLGsOmbiQqhJ8C_gunh1XmQ3nvJN6v3Xw/exec';
// ════════════════════════════════════════════════════

const DAYS=['Lunes','Martes','Miércoles','Jueves','Viernes'];
const HOURS=['07:00','07:30','08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00'];
const DOCS={joel:{name:'Dr. Joel Lopez',role:'Coordinador',cls:'j'},diego:{name:'Dr. Diego Cantero',role:'Subcoordinador',cls:'d'}};
const TO1='clopez@unida.edu.py',TO2='subcoordiacion.medicinacde@unida.edu.py';
const API='https://api.anthropic.com/v1/messages';
const MODEL='claude-sonnet-4-20250514';

let db={},citas=[];
let studentData={},selectedSlot=null,analysisText='';
let slotWeekOffset=0,slotDocTab='joel';

async function cloudLoad(){
  if(SCRIPT_URL==='https://script.google.com/macros/s/AKfycby-3Ps2DWWgUe7J9pefJdCdMcLEETHowBOLGsOmbiQqhJ8C_gunh1XmQ3nvJN6v3Xw/exec')return;
  try{
    const r=await fetch(SCRIPT_URL+'?action=getDb');
    const j=await r.json();
    if(j.ok)db=j.data||{};
    const r2=await fetch(SCRIPT_URL+'?action=getCitas');
    const j2=await r2.json();
    if(j2.ok)citas=j2.data||[];
  }catch(e){console.warn('cloudLoad error',e);}
}
async function cloudSaveDb(){
  if(SCRIPT_URL==='https://script.google.com/macros/s/AKfycby-3Ps2DWWgUe7J9pefJdCdMcLEETHowBOLGsOmbiQqhJ8C_gunh1XmQ3nvJN6v3Xw/exec')return;
  try{await fetch(SCRIPT_URL+'?action=saveDb&data='+encodeURIComponent(JSON.stringify(db)));}catch(e){}
}
async function cloudSaveCita(cita){
  if(SCRIPT_URL==='https://script.google.com/macros/s/AKfycby-3Ps2DWWgUe7J9pefJdCdMcLEETHowBOLGsOmbiQqhJ8C_gunh1XmQ3nvJN6v3Xw/exec')return;
  try{await fetch(SCRIPT_URL+'?action=saveCita&cita='+encodeURIComponent(JSON.stringify(cita)));}catch(e){}
}

function wKey(o){const d=new Date();d.setDate(d.getDate()-d.getDay()+1+o*7);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');}
function wDates(o){const d=new Date();d.setDate(d.getDate()-d.getDay()+1+o*7);return Array.from({length:5},(_,i)=>{const n=new Date(d);n.setDate(d.getDate()+i);return n;});}
function fmt(d){return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0');}
function wLabel(o){const d=wDates(o);return fmt(d[0])+' - '+fmt(d[4])+' '+d[0].getFullYear();}
function getSlots(doc,o){return db[doc+'_'+wKey(o)]||{};}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function setStep(n){
  [1,2,3,4,5].forEach(i=>document.getElementById('sp'+i).style.display=i===n?'block':'none');
  [1,2,3,4].forEach(i=>{
    const sn=document.getElementById('sn'+i);const sl=document.getElementById('sl'+i);if(!sn)return;
    sn.className='snum'+(i<n?' done':i===n?' active':'');
    sl.className='slbl'+(i<n?' done':i===n?' active':'');
  });
  if(n===1)s1();else if(n===2)s2();else if(n===3)s3();else if(n===4)s4();else if(n===5)s5();
}

function s1(){
  const notConf=SCRIPT_URL==='https://script.google.com/macros/s/AKfycby-3Ps2DWWgUe7J9pefJdCdMcLEETHowBOLGsOmbiQqhJ8C_gunh1XmQ3nvJN6v3Xw/exec'?'<div class="config-banner"><strong>Aviso:</strong> El portal no está conectado a la base de datos aún. Seguí las instrucciones del README para configurar el SCRIPT_URL.</div>':'';
  document.getElementById('sp1').innerHTML=notConf+'<div class="card"><div class="section-label">Datos del estudiante</div><div class="fg"><div class="fld"><label>Nombre</label><input id="f-nombre" value="'+escH(studentData.nombre||'')+'" placeholder="Ej: María"/><div class="err" id="e-nombre">Ingresá tu nombre</div></div><div class="fld"><label>Apellido</label><input id="f-apellido" value="'+escH(studentData.apellido||'')+'" placeholder="Ej: González"/><div class="err" id="e-apellido">Ingresá tu apellido</div></div><div class="fld"><label>N° de matrícula</label><input id="f-matricula" value="'+escH(studentData.matricula||'')+'" placeholder="MED-2024-001"/><div class="err" id="e-matricula">Ingresá tu matrícula</div></div><div class="fld"><label>Correo electrónico</label><input id="f-correo" type="email" value="'+escH(studentData.correo||'')+'" placeholder="nombre@unida.edu.py"/><div class="err" id="e-correo">Correo inválido</div></div><div class="fld ff"><label>Tema a desarrollar</label><textarea id="f-tema" placeholder="Describí el motivo de la cita…">'+escH(studentData.tema||'')+'</textarea><div class="err" id="e-tema">Describí el tema</div></div></div></div><div class="btn-row"><button class="btn btn-primary" onclick="s1next()">Elegir turno →</button></div>';
}

function s1next(){
  const fs=[{id:'f-nombre',eid:'e-nombre'},{id:'f-apellido',eid:'e-apellido'},{id:'f-matricula',eid:'e-matricula'},{id:'f-correo',eid:'e-correo'},{id:'f-tema',eid:'e-tema'}];
  let ok=true;
  fs.forEach(f=>{const v=document.getElementById(f.id).value.trim();let bad=!v;if(f.id==='f-correo'&&v)bad=!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);document.getElementById(f.eid).className='err'+(bad?' show':'');if(bad)ok=false;});
  if(!ok)return;
  studentData={nombre:document.getElementById('f-nombre').value.trim(),apellido:document.getElementById('f-apellido').value.trim(),matricula:document.getElementById('f-matricula').value.trim(),correo:document.getElementById('f-correo').value.trim(),tema:document.getElementById('f-tema').value.trim()};
  setStep(2);
}

async function s2(){
  selectedSlot=null;
  document.getElementById('sp2').innerHTML='<div class="card"><div class="section-label">Seleccioná un horario disponible</div><div class="loading"><div class="spinner"></div><p style="color:#aaa;font-size:14px">Cargando horarios desde la base de datos…</p></div></div><div class="btn-row"><button class="btn" onclick="setStep(1)">← Volver</button></div>';
  await cloudLoad();
  document.getElementById('sp2').innerHTML='<div class="card"><div class="section-label">Seleccioná un horario disponible</div><div class="doc-tabs"><button class="doc-tab" id="dtab-joel" onclick="setDoc('joel')">Dr. Joel Lopez</button><button class="doc-tab" id="dtab-diego" onclick="setDoc('diego')">Dr. Diego Cantero</button></div><div class="week-nav"><button class="btn btn-icon" onclick="chW(-1)">&#8592;</button><span class="week-lbl" id="wlbl"></span><button class="btn btn-icon" onclick="chW(1)">&#8594;</button></div><div id="slots-area"></div><div id="sel-info" style="margin-top:.875rem;font-size:13px;color:#888;min-height:18px;"></div></div><div class="btn-row"><button class="btn" onclick="setStep(1)">← Volver</button><button class="btn btn-primary" id="btn-s2" onclick="setStep(3)" disabled>Analizar tema →</button></div>';
  setDoc('joel');
}

function setDoc(doc){
  slotDocTab=doc;
  ['joel','diego'].forEach(d=>{const t=document.getElementById('dtab-'+d);if(t)t.className='doc-tab'+(d===doc?' a'+DOCS[d].cls:'');});
  renderSlots();
}
function chW(dir){slotWeekOffset+=dir;renderSlots();}

function renderSlots(){
  const lbl=document.getElementById('wlbl');if(lbl)lbl.textContent=wLabel(slotWeekOffset);
  const area=document.getElementById('slots-area');if(!area)return;
  const slots=getSlots(slotDocTab,slotWeekOffset);
  const dates=wDates(slotWeekOffset);
  const dInfo=DOCS[slotDocTab];
  let hasAny=false;
  let html='<div class="slots-grid">';
  dates.forEach((date,i)=>{
    const dayName=DAYS[i];
    const daySlots=(slots[dayName]||[]).filter(s=>!s.occupied);
    if(daySlots.length)hasAny=true;
    html+='<div class="day-col"><div class="day-head">'+dayName.substring(0,3)+'</div><div class="day-ds">'+fmt(date)+'</div>';
    if(!daySlots.length)html+='<div class="no-slot">—</div>';
    else daySlots.forEach(s=>{
      const sel=selectedSlot&&selectedSlot.doc===slotDocTab&&selectedSlot.day===dayName&&selectedSlot.time===s.time&&selectedSlot.weekOffset===slotWeekOffset;
      html+='<button class="slot-btn'+(sel?' sel-'+dInfo.cls:'')+'" onclick="pickSlot(''+slotDocTab+'',''+dayName+'',''+s.time+'','+slotWeekOffset+',''+fmt(date)+'')">'+s.time+'</button>';
    });
    html+='</div>';
  });
  html+='</div>';
  if(!hasAny)html='<div class="no-avail">No hay horarios disponibles esta semana.<br>Probá la siguiente semana o el otro profesional.</div>';
  area.innerHTML=html;
}

function pickSlot(doc,day,time,weekOffset,dateStr){
  selectedSlot={doc,day,time,weekOffset,dateStr};
  const info=document.getElementById('sel-info');
  if(info)info.innerHTML='Turno seleccionado: <strong>'+DOCS[doc].name+'</strong> — '+day+' '+dateStr+' a las <strong>'+time+'</strong>';
  const btn=document.getElementById('btn-s2');if(btn)btn.disabled=false;
  renderSlots();
}

async function s3(){
  document.getElementById('sp3').innerHTML='<div class="card"><div class="section-label">Análisis del tema</div><div class="abox"><div class="ameta"><div class="dot-a" id="adot"></div><span id="a-status">Analizando tu solicitud…</span></div><div id="a-text" style="font-size:14px;line-height:1.7;color:#333;white-space:pre-wrap;margin-top:5px;"></div></div></div><div class="btn-row"><button class="btn" onclick="setStep(2)">← Volver</button><button class="btn btn-primary" id="btn-s3" onclick="setStep(4)" disabled>Confirmar cita →</button></div>';
  try{
    const res=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:1000,system:'Eres el asistente de la Coordinación Académica de la carrera de Medicina de la UNIDA, Paraguay. Analizá en 3-5 oraciones el tema del estudiante. Indicá si es pertinente para la coordinación, qué documentos necesitaría traer y cualquier observación útil. Sé profesional y empático. Respondé en español.',messages:[{role:'user',content:'Estudiante: '+studentData.nombre+' '+studentData.apellido+'. Tema: "'+studentData.tema+'". Cita con '+DOCS[selectedSlot.doc].name+' el '+selectedSlot.day+' '+selectedSlot.dateStr+' a las '+selectedSlot.time+'.'}]})});
    const data=await res.json();
    analysisText=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n')||'No se pudo obtener análisis.';
  }catch(e){analysisText='No se pudo conectar al servicio. Podés continuar de todas formas.';}
  const adot=document.getElementById('adot');if(adot)adot.className='dot-ok';
  const ast=document.getElementById('a-status');if(ast)ast.textContent='Análisis completado';
  const at=document.getElementById('a-text');if(at)at.textContent=analysisText;
  const btn=document.getElementById('btn-s3');if(btn)btn.disabled=false;
}

function s4(){
  const dInfo=DOCS[selectedSlot.doc];
  document.getElementById('sp4').innerHTML='<div class="card"><div class="section-label">Resumen de la solicitud</div><div class="sg"><div class="si"><div class="sk">Nombre completo</div><div class="sv">'+escH(studentData.nombre+' '+studentData.apellido)+'</div></div><div class="si"><div class="sk">N° de matrícula</div><div class="sv">'+escH(studentData.matricula)+'</div></div><div class="si sf"><div class="sk">Correo</div><div class="sv">'+escH(studentData.correo)+'</div></div><div class="si sf"><div class="sk">Tema</div><div class="sv" style="white-space:normal;line-height:1.4">'+escH(studentData.tema)+'</div></div><div class="si"><div class="sk">Profesional</div><div class="sv"><span class="badge b'+dInfo.cls+'">'+dInfo.name+'</span></div></div><div class="si"><div class="sk">Turno</div><div class="sv">'+selectedSlot.day+' '+selectedSlot.dateStr+' · '+selectedSlot.time+'</div></div></div><div class="abox"><div class="ameta"><div class="dot-ok"></div><span style="font-size:12px;color:#888">Análisis previo del tema</span></div><div style="font-size:14px;line-height:1.6;color:#333;margin-top:5px">'+escH(analysisText)+'</div></div></div><div class="btn-row"><button class="btn" onclick="setStep(3)">← Volver</button><button class="btn btn-success" onclick="confirmar()">Confirmar y enviar ✓</button></div>';
}

async function confirmar(){
  const slots=getSlots(selectedSlot.doc,selectedSlot.weekOffset);
  const daySlots=slots[selectedSlot.day]||[];
  const idx=daySlots.findIndex(s=>s.time===selectedSlot.time);
  if(idx>=0)daySlots[idx].occupied=true;
  slots[selectedSlot.day]=daySlots;
  db[selectedSlot.doc+'_'+wKey(selectedSlot.weekOffset)]=slots;
  await cloudSaveDb();
  const ref='CIT-'+Date.now().toString().slice(-6);
  const cita={ref,doc:selectedSlot.doc,nombre:studentData.nombre,apellido:studentData.apellido,matricula:studentData.matricula,correo:studentData.correo,tema:studentData.tema,day:selectedSlot.day,dateStr:selectedSlot.dateStr,time:selectedSlot.time,weekLabel:wLabel(selectedSlot.weekOffset),analysis:analysisText,createdAt:new Date().toISOString()};
  citas.push(cita);
  await cloudSaveCita(cita);
  const dInfo=DOCS[selectedSlot.doc];
  try{await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:MODEL,max_tokens:300,system:'Creá un borrador de correo en Gmail.',messages:[{role:'user',content:'Borrador: Para: '+TO1+', '+TO2+' — Asunto: Nueva cita '+ref+': '+studentData.nombre+' '+studentData.apellido+' · '+selectedSlot.day+' '+selectedSlot.dateStr+' '+selectedSlot.time+' — Cuerpo: Estudiante '+studentData.nombre+' '+studentData.apellido+' ('+studentData.matricula+') confirmó una cita con '+dInfo.name+' el '+selectedSlot.day+' '+selectedSlot.dateStr+' a las '+selectedSlot.time+'. Tema: '+studentData.tema+'. Ref: '+ref}],mcp_servers:[{type:'url',url:'https://gmail.mcp.claude.com/mcp',name:'gmail-mcp'}]})});}catch(e){}
  setStep(5);
}

function s5(){
  const dInfo=DOCS[selectedSlot.doc];const last=citas[citas.length-1];
  document.getElementById('sp5').innerHTML='<div class="card"><div class="suc"><div class="suc-icon"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="#1D9E75" stroke-width="2"/><path d="M8 14l4 4 8-8" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div><h2 style="font-size:20px;font-weight:700;color:#1D9E75;margin-bottom:6px">¡Cita confirmada!</h2><div class="ref">'+(last?last.ref:'CIT-000000')+'</div><p style="font-size:14px;color:#666;line-height:1.7;max-width:400px;margin:0 auto .75rem">Cita con <strong>'+dInfo.name+'</strong> el <strong>'+selectedSlot.day+' '+selectedSlot.dateStr+'</strong> a las <strong>'+selectedSlot.time+'</strong>.<br>La coordinación fue notificada.</p><p style="font-size:13px;color:#aaa">Confirmación a <strong>'+escH(studentData.correo)+'</strong></p><div class="btn-row" style="justify-content:center;margin-top:1.5rem"><button class="btn btn-primary" onclick="location.reload()">Solicitar otra cita</button></div></div></div>';
}

setStep(1);
</script>
