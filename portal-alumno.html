<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portal de Agendamiento · Alumno · UNIDA Medicina</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f4f6fb;min-height:100vh;color:#1a1a2e;}
.topbar{background:#185FA5;padding:12px 24px;display:flex;align-items:center;gap:12px;}
.topbar-logo{width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.topbar-logo svg{width:18px;height:18px;}
.topbar-title{color:#fff;font-size:15px;font-weight:600;}
.topbar-sub{color:rgba(255,255,255,.7);font-size:12px;margin-left:auto;}
.wrap{max-width:680px;margin:0 auto;padding:2rem 1rem;}
.card{background:#fff;border:1px solid #e8eaf0;border-radius:14px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.page-title{font-size:22px;font-weight:700;color:#185FA5;margin-bottom:4px;}
.page-sub{font-size:14px;color:#666;margin-bottom:1.5rem;}
.steps{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:2rem;}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;}
.snum{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;border:2px solid #d0d5e8;background:#f4f6fb;color:#aaa;transition:all .3s;}
.snum.active{background:#185FA5;color:#fff;border-color:#185FA5;}
.snum.done{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.slbl{font-size:11px;color:#aaa;white-space:nowrap;}
.slbl.active{color:#185FA5;font-weight:600;}
.slbl.done{color:#1D9E75;}
.sline{width:40px;height:2px;background:#e0e4f0;margin-bottom:16px;}
.section-label{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem;}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-full{grid-column:1/-1;}
.field{display:flex;flex-direction:column;gap:5px;}
label{font-size:13px;color:#555;font-weight:500;}
input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:10px 12px;border:1.5px solid #dde0eb;border-radius:8px;background:#fff;color:#1a1a2e;outline:none;transition:border .2s;}
input:focus,select:focus,textarea:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.1);}
textarea{min-height:90px;resize:vertical;line-height:1.5;}
.err{font-size:11px;color:#E24B4A;margin-top:2px;display:none;}
.err.show{display:block;}
.doc-tabs{display:flex;gap:8px;margin-bottom:1rem;}
.doc-tab{font-family:inherit;font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;cursor:pointer;border:1.5px solid #dde0eb;background:#f4f6fb;color:#888;transition:all .15s;}
.doc-tab.aj{background:#E6F1FB;color:#0C447C;border-color:#85B7EB;}
.doc-tab.ad{background:#E1F5EE;color:#085041;border-color:#5DCAA5;}
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
.week-lbl{font-size:14px;font-weight:600;color:#1a1a2e;flex:1;text-align:center;}
.btn{font-family:inherit;font-size:14px;font-weight:600;padding:10px 20px;border-radius:9px;cursor:pointer;transition:all .15s;border:1.5px solid #dde0eb;background:transparent;color:#333;}
.btn:hover{background:#f0f2f8;}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-icon{padding:8px 12px;font-size:16px;}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5;}
.btn-primary:hover{background:#0C447C;border-color:#0C447C;}
.btn-success{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.btn-success:hover{background:#0F6E56;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:1rem;}
.slots-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.day-col{display:flex;flex-direction:column;gap:4px;}
.day-head{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;text-align:center;padding-bottom:5px;border-bottom:2px solid #eee;}
.day-date-s{font-size:10px;color:#aaa;text-align:center;margin-bottom:3px;}
.slot-btn{font-family:inherit;font-size:12px;padding:7px 3px;border-radius:7px;cursor:pointer;border:1.5px solid #e0e4f0;background:#f8f9fc;color:#444;text-align:center;width:100%;transition:all .15s;font-weight:500;}
.slot-btn:hover{border-color:#185FA5;background:#E6F1FB;color:#0C447C;}
.slot-btn.sel-j{background:#E6F1FB;color:#0C447C;border-color:#185FA5;font-weight:700;}
.slot-btn.sel-d{background:#E1F5EE;color:#085041;border-color:#1D9E75;font-weight:700;}
.no-slot{font-size:11px;color:#ccc;text-align:center;padding:6px 0;}
.no-avail{text-align:center;padding:2rem;color:#888;font-size:14px;background:#f8f9fc;border-radius:10px;}
.analysis-box{background:#f8f9fc;border-radius:10px;padding:1.25rem;border:1px solid #e8eaf0;}
.analysis-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:#888;margin-bottom:8px;}
.dot-anim{width:8px;height:8px;border-radius:50%;background:#378ADD;animation:pulse 1s infinite;flex-shrink:0;}
.dot-ok{width:8px;height:8px;border-radius:50%;background:#1D9E75;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.sum-item{background:#f4f6fb;border-radius:9px;padding:10px 12px;}
.sum-key{font-size:10px;color:#999;text-transform:uppercase;letter-spacing:.05em;font-weight:700;}
.sum-val{font-size:14px;font-weight:600;color:#1a1a2e;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sum-full{grid-column:1/-1;}
.badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:999px;}
.badge-j{background:#E6F1FB;color:#0C447C;}
.badge-d{background:#E1F5EE;color:#085041;}
.success-wrap{text-align:center;padding:2.5rem 1rem;}
.success-icon{width:60px;height:60px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;}
.ref-code{display:inline-block;background:#E6F1FB;color:#185FA5;font-size:13px;font-weight:700;padding:5px 18px;border-radius:999px;margin:.5rem 0 1rem;}
@media(max-width:500px){.field-grid{grid-template-columns:1fr}.slots-grid{grid-template-columns:1fr 1fr}.sum-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-logo"><svg viewBox="0 0 20 20" fill="none"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm0 3v5l3 3" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></div>
  <div class="topbar-title">Portal de Agendamiento · UNIDA</div>
  <span class="topbar-sub">Carrera de Medicina</span>
</div>

<div class="wrap">
  <div class="page-title">Solicitar cita</div>
  <div class="page-sub">Coordinación Académica · Carrera de Medicina</div>

  <div class="steps">
    <div class="step"><div class="snum active" id="sn1">1</div><div class="slbl active" id="sl1">Mis datos</div></div>
    <div class="sline"></div>
    <div class="step"><div class="snum" id="sn2">2</div><div class="slbl" id="sl2">Elegir turno</div></div>
    <div class="sline"></div>
    <div class="step"><div class="snum" id="sn3">3</div><div class="slbl" id="sl3">Análisis</div></div>
    <div class="sline"></div>
    <div class="step"><div class="snum" id="sn4">4</div><div class="slbl" id="sl4">Confirmar</div></div>
  </div>

  <div id="sp1"></div>
  <div id="sp2" style="display:none"></div>
  <div id="sp3" style="display:none"></div>
  <div id="sp4" style="display:none"></div>
  <div id="sp5" style="display:none"></div>
</div>

<script>
const DAYS=['Lunes','Martes','Miércoles','Jueves','Viernes'];
const HOURS=['07:00','07:30','08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00'];
const DOCS={joel:{name:'Dr. Joel Lopez',role:'Coordinador',cls:'j'},diego:{name:'Dr. Diego Cantero',role:'Subcoordinador',cls:'d'}};
const TO1='clopez@unida.edu.py',TO2='subcoordiacion.medicinacde@unida.edu.py';
const DB_KEY='unida_agenda_db',CITAS_KEY='unida_citas_db';

let db={},citas=[];
let studentData={},selectedSlot=null,analysisText='';
let slotWeekOffset=0,slotDocTab='joel';

function wKey(o){const d=new Date();d.setDate(d.getDate()-d.getDay()+1+o*7);return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;}
function wDates(o){const d=new Date();d.setDate(d.getDate()-d.getDay()+1+o*7);return Array.from({length:5},(_,i)=>{const n=new Date(d);n.setDate(d.getDate()+i);return n;});}
function fmt(d){return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0');}
function wLabel(o){const d=wDates(o);return fmt(d[0])+' – '+fmt(d[4])+' '+d[0].getFullYear();}
function getSlots(doc,o){return db[doc+'_'+wKey(o)]||{};}

function loadDb(){
  try{const r=localStorage.getItem(DB_KEY);if(r)db=JSON.parse(r);}catch(e){db={};}
  try{const r=localStorage.getItem(CITAS_KEY);if(r)citas=JSON.parse(r);}catch(e){citas=[];}
}
function saveDb(){
  try{localStorage.setItem(DB_KEY,JSON.stringify(db));localStorage.setItem(CITAS_KEY,JSON.stringify(citas));}catch(e){}
}

function setStudentStep(n){
  [1,2,3,4,5].forEach(i=>document.getElementById('sp'+i).style.display=i===n?'block':'none');
  [1,2,3,4].forEach(i=>{
    const sn=document.getElementById('sn'+i);const sl=document.getElementById('sl'+i);if(!sn)return;
    sn.className='snum'+(i<n?' done':i===n?' active':'');sl.className='slbl'+(i<n?' done':i===n?' active':'');
  });
  if(n===1)renderStep1();if(n===2)renderStep2();if(n===3)renderStep3();if(n===4)renderStep4();if(n===5)renderStep5();
}

function renderStep1(){
  document.getElementById('sp1').innerHTML=`<div class="card"><div class="section-label">Datos del estudiante</div><div class="field-grid">
    <div class="field"><label>Nombre</label><input id="f-nombre" value="${studentData.nombre||''}" placeholder="Ej: María"/><div class="err" id="e-nombre">Ingresá tu nombre</div></div>
    <div class="field"><label>Apellido</label><input id="f-apellido" value="${studentData.apellido||''}" placeholder="Ej: González"/><div class="err" id="e-apellido">Ingresá tu apellido</div></div>
    <div class="field"><label>N° de matrícula</label><input id="f-matricula" value="${studentData.matricula||''}" placeholder="MED-2024-001"/><div class="err" id="e-matricula">Ingresá tu matrícula</div></div>
    <div class="field"><label>Correo electrónico</label><input id="f-correo" type="email" value="${studentData.correo||''}" placeholder="nombre@unida.edu.py"/><div class="err" id="e-correo">Correo inválido</div></div>
    <div class="field field-full"><label>Tema a desarrollar</label><textarea id="f-tema" placeholder="Describí el motivo de la cita con la coordinación…">${studentData.tema||''}</textarea><div class="err" id="e-tema">Describí el tema</div></div>
  </div></div>
  <div class="btn-row"><button class="btn btn-primary" onclick="step1Next()">Elegir turno →</button></div>`;}

function step1Next(){
  const fs=[{id:'f-nombre',eid:'e-nombre'},{id:'f-apellido',eid:'e-apellido'},{id:'f-matricula',eid:'e-matricula'},{id:'f-correo',eid:'e-correo'},{id:'f-tema',eid:'e-tema'}];
  let ok=true;
  fs.forEach(f=>{const v=document.getElementById(f.id).value.trim();let bad=!v;if(f.id==='f-correo'&&v)bad=!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);document.getElementById(f.eid).className='err'+(bad?' show':'');if(bad)ok=false;});
  if(!ok)return;
  studentData={nombre:document.getElementById('f-nombre').value.trim(),apellido:document.getElementById('f-apellido').value.trim(),matricula:document.getElementById('f-matricula').value.trim(),correo:document.getElementById('f-correo').value.trim(),tema:document.getElementById('f-tema').value.trim()};
  setStudentStep(2);
}

function renderStep2(){
  selectedSlot=null;
  document.getElementById('sp2').innerHTML=`<div class="card"><div class="section-label">Seleccioná un horario disponible</div>
    <div class="doc-tabs"><button class="doc-tab" id="dtab-joel" onclick="setSlotDoc('joel')">Dr. Joel Lopez</button><button class="doc-tab" id="dtab-diego" onclick="setSlotDoc('diego')">Dr. Diego Cantero</button></div>
    <div class="week-nav"><button class="btn btn-icon" onclick="sChangeWeek(-1)">&#8592;</button><span class="week-lbl" id="s-week-lbl"></span><button class="btn btn-icon" onclick="sChangeWeek(1)">&#8594;</button></div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="btn" style="font-size:12px;padding:5px 12px" onclick="renderSlotsGrid()">&#8635; Actualizar turnos</button></div><div id="slots-area"></div>
    <div id="sel-info" style="margin-top:.75rem;font-size:13px;color:#888;min-height:18px;"></div>
  </div>
  <div class="btn-row"><button class="btn" onclick="setStudentStep(1)">← Volver</button><button class="btn btn-primary" id="btn-s2" onclick="setStudentStep(3)" disabled>Analizar tema →</button></div>`;
  setSlotDoc(slotDocTab);}

function setSlotDoc(doc){
  slotDocTab=doc;
  ['joel','diego'].forEach(d=>{const t=document.getElementById('dtab-'+d);if(t)t.className='doc-tab'+(d===doc?' a'+DOCS[d].cls:'');});
  renderSlotsGrid();}

function sChangeWeek(dir){slotWeekOffset+=dir;renderSlotsGrid();}

function renderSlotsGrid(){
  loadDb();
  const lbl=document.getElementById('s-week-lbl');if(lbl)lbl.textContent=wLabel(slotWeekOffset);
  const area=document.getElementById('slots-area');if(!area)return;
  const slots=getSlots(slotDocTab,slotWeekOffset);const dates=wDates(slotWeekOffset);const dInfo=DOCS[slotDocTab];
  let hasAny=false;
  let html=`<div class="slots-grid">`;
  dates.forEach((date,i)=>{
    const dayName=DAYS[i];const daySlots=(slots[dayName]||[]).filter(s=>!s.occupied);if(daySlots.length)hasAny=true;
    html+=`<div class="day-col"><div class="day-head">${dayName.substring(0,3)}</div><div class="day-date-s">${fmt(date)}</div>`;
    if(!daySlots.length)html+=`<div class="no-slot">—</div>`;
    else daySlots.forEach(s=>{
      const isSel=selectedSlot&&selectedSlot.doc===slotDocTab&&selectedSlot.day===dayName&&selectedSlot.time===s.time&&selectedSlot.weekOffset===slotWeekOffset;
      html+=`<button class="slot-btn${isSel?' sel-'+dInfo.cls:''}" onclick="pickSlot('${slotDocTab}','${dayName}','${s.time}',${slotWeekOffset},'${fmt(date)}')">${s.time}</button>`;
    });
    html+=`</div>`;
  });
  html+=`</div>`;
  if(!hasAny)html=`<div class="no-avail">No hay horarios disponibles esta semana.<br>Probá la siguiente semana o el otro profesional.</div>`;
  area.innerHTML=html;}

function pickSlot(doc,day,time,weekOffset,dateStr){
  selectedSlot={doc,day,time,weekOffset,dateStr};
  const dInfo=DOCS[doc];
  const info=document.getElementById('sel-info');
  if(info)info.innerHTML=`Turno seleccionado: <strong>${dInfo.name}</strong> — ${day} ${dateStr} a las <strong>${time}</strong>`;
  const btn=document.getElementById('btn-s2');if(btn)btn.disabled=false;
  renderSlotsGrid();}

async function renderStep3(){
  document.getElementById('sp3').innerHTML=`<div class="card"><div class="section-label">Análisis del tema</div>
    <div class="analysis-box"><div class="analysis-meta"><div class="dot-anim" id="adot"></div><span id="a-status">Analizando tu solicitud…</span></div>
    <div id="a-text" style="font-size:14px;line-height:1.7;color:#333;white-space:pre-wrap;margin-top:6px;"></div></div></div>
  <div class="btn-row"><button class="btn" onclick="setStudentStep(2)">← Volver</button><button class="btn btn-primary" id="btn-s3" onclick="setStudentStep(4)" disabled>Confirmar cita →</button></div>`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:`Eres el asistente de la Coordinación Académica de la carrera de Medicina de la UNIDA, Paraguay. Analizá en 3-5 oraciones el tema del estudiante. Indicá si es pertinente para la coordinación, qué documentos necesitaría traer y cualquier observación útil. Sé profesional y empático. Respondé en español.`,messages:[{role:'user',content:`Estudiante: ${studentData.nombre} ${studentData.apellido}. Tema: "${studentData.tema}". Cita con ${DOCS[selectedSlot.doc].name} el ${selectedSlot.day} ${selectedSlot.dateStr} a las ${selectedSlot.time}.`}]})});
    const data=await res.json();
    analysisText=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n')||'No se pudo obtener análisis.';
  }catch(e){analysisText='No se pudo conectar al servicio de análisis. Podés continuar de todas formas.';}
  const adot=document.getElementById('adot');if(adot)adot.className='dot-ok';
  const ast=document.getElementById('a-status');if(ast)ast.textContent='Análisis completado';
  const at=document.getElementById('a-text');if(at)at.textContent=analysisText;
  const btn=document.getElementById('btn-s3');if(btn)btn.disabled=false;}

function renderStep4(){
  const dInfo=DOCS[selectedSlot.doc];
  document.getElementById('sp4').innerHTML=`<div class="card"><div class="section-label">Resumen de la solicitud</div>
    <div class="sum-grid">
      <div class="sum-item"><div class="sum-key">Nombre completo</div><div class="sum-val">${studentData.nombre} ${studentData.apellido}</div></div>
      <div class="sum-item"><div class="sum-key">N° de matrícula</div><div class="sum-val">${studentData.matricula}</div></div>
      <div class="sum-item sum-full"><div class="sum-key">Correo electrónico</div><div class="sum-val">${studentData.correo}</div></div>
      <div class="sum-item sum-full"><div class="sum-key">Tema a tratar</div><div class="sum-val" style="white-space:normal;line-height:1.4">${studentData.tema}</div></div>
      <div class="sum-item"><div class="sum-key">Profesional</div><div class="sum-val"><span class="badge badge-${dInfo.cls}">${dInfo.name}</span></div></div>
      <div class="sum-item"><div class="sum-key">Turno</div><div class="sum-val">${selectedSlot.day} ${selectedSlot.dateStr} · ${selectedSlot.time}</div></div>
    </div>
    <div class="analysis-box"><div class="analysis-meta"><div class="dot-ok"></div><span style="font-size:12px;color:#888">Análisis previo del tema</span></div>
    <div style="font-size:14px;line-height:1.6;color:#333;margin-top:4px">${analysisText}</div></div></div>
  <div class="btn-row"><button class="btn" onclick="setStudentStep(3)">← Volver</button><button class="btn btn-success" onclick="confirmCita()">Confirmar y enviar cita ✓</button></div>`;}

async function confirmCita(){
  const slots=getSlots(selectedSlot.doc,selectedSlot.weekOffset);
  const daySlots=slots[selectedSlot.day]||[];
  const idx=daySlots.findIndex(s=>s.time===selectedSlot.time);
  if(idx>=0)daySlots[idx].occupied=true;
  slots[selectedSlot.day]=daySlots;
  db[selectedSlot.doc+'_'+wKey(selectedSlot.weekOffset)]=slots;
  const ref='CIT-'+Date.now().toString().slice(-6);
  citas.push({ref,doc:selectedSlot.doc,nombre:studentData.nombre,apellido:studentData.apellido,matricula:studentData.matricula,correo:studentData.correo,tema:studentData.tema,day:selectedSlot.day,dateStr:selectedSlot.dateStr,time:selectedSlot.time,weekLabel:wLabel(selectedSlot.weekOffset),analysis:analysisText,createdAt:new Date().toISOString()});
  saveDb();
  const dInfo=DOCS[selectedSlot.doc];
  const notifHtml=`<div style="font-family:Arial,sans-serif;max-width:580px;margin:0 auto"><div style="background:#1D9E75;padding:16px 22px;border-radius:8px 8px 0 0"><p style="color:#fff;font-size:11px;margin:0;text-transform:uppercase">Nueva cita · UNIDA Medicina</p><h2 style="color:#fff;font-size:18px;margin:6px 0 0">Solicitud de cita registrada</h2></div><div style="background:#f9f9f9;padding:18px 22px;border-radius:0 0 8px 8px;border:1px solid #e8e8e8;border-top:none"><table style="width:100%;font-size:13px;border-collapse:collapse"><tr><td style="padding:5px 0;color:#777;width:38%">Estudiante</td><td style="padding:5px 0;font-weight:600">${studentData.nombre} ${studentData.apellido}</td></tr><tr><td style="padding:5px 0;color:#777">Matrícula</td><td style="padding:5px 0">${studentData.matricula}</td></tr><tr><td style="padding:5px 0;color:#777">Correo</td><td style="padding:5px 0">${studentData.correo}</td></tr><tr><td style="padding:5px 0;color:#777">Profesional</td><td style="padding:5px 0">${dInfo.name}</td></tr><tr><td style="padding:5px 0;color:#777">Turno</td><td style="padding:5px 0;font-weight:600">${selectedSlot.day} ${selectedSlot.dateStr} · ${selectedSlot.time}</td></tr><tr><td style="padding:5px 0;color:#777;vertical-align:top">Tema</td><td style="padding:5px 0">${studentData.tema}</td></tr></table><p style="font-size:11px;color:#aaa;margin-top:14px">Ref: ${ref} · Portal de Agendamiento · UNIDA Medicina</p></div></div>`;
  try{await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:300,system:'Creá un borrador de correo en Gmail con los datos indicados.',messages:[{role:'user',content:`Borrador: Para: ${TO1}, ${TO2} — Asunto: Nueva cita ${ref}: ${studentData.nombre} ${studentData.apellido} · ${selectedSlot.day} ${selectedSlot.dateStr} ${selectedSlot.time} — Cuerpo HTML: ${notifHtml}`}],mcp_servers:[{type:'url',url:'https://gmail.mcp.claude.com/mcp',name:'gmail-mcp'}]})});}catch(e){}
  setStudentStep(5);}

function renderStep5(){
  const dInfo=DOCS[selectedSlot.doc];const lastCita=citas[citas.length-1];
  document.getElementById('sp5').innerHTML=`<div class="card"><div class="success-wrap">
    <div class="success-icon"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="#1D9E75" stroke-width="2"/><path d="M8 14l4 4 8-8" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
    <h2 style="font-size:20px;font-weight:700;color:#1D9E75;margin-bottom:6px">¡Cita confirmada!</h2>
    <div class="ref-code">${lastCita?lastCita.ref:'CIT-000000'}</div>
    <p style="font-size:14px;color:#666;line-height:1.7;max-width:400px;margin:0 auto .75rem">Tu cita con <strong>${dInfo.name}</strong> fue registrada para el <strong>${selectedSlot.day} ${selectedSlot.dateStr}</strong> a las <strong>${selectedSlot.time}</strong>.<br>La coordinación fue notificada automáticamente.</p>
    <p style="font-size:13px;color:#aaa">Se enviará confirmación a <strong>${studentData.correo}</strong></p>
    <div class="btn-row" style="justify-content:center;margin-top:1.5rem"><button class="btn btn-primary" onclick="resetStudent()">Solicitar otra cita</button></div>
  </div></div>`;}

function resetStudent(){studentData={};selectedSlot=null;analysisText='';slotWeekOffset=0;slotDocTab='joel';setStudentStep(1);}

loadDb();setStudentStep(1);
</script>
