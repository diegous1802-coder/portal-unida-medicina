<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portal de Agendamiento · Alumno · UNIDA Medicina</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Segoe UI",Arial,sans-serif;background:#f4f6fb;min-height:100vh;color:#1a1a2e;}
.topbar{background:#185FA5;padding:0 24px;display:flex;align-items:center;gap:12px;height:52px;}
.topbar-t{color:#fff;font-size:15px;font-weight:600;}
.topbar-s{color:rgba(255,255,255,.7);font-size:12px;margin-left:auto;}
.wrap{max-width:680px;margin:0 auto;padding:1.5rem 1rem;}
.page-title{font-size:22px;font-weight:700;color:#185FA5;margin-bottom:4px;}
.page-sub{font-size:14px;color:#666;margin-bottom:1.5rem;}
.steps{display:flex;align-items:center;justify-content:center;margin-bottom:2rem;}
.step{display:flex;flex-direction:column;align-items:center;gap:4px;}
.snum{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;border:2px solid #d0d5e8;background:#f4f6fb;color:#aaa;transition:all .3s;}
.snum.active{background:#185FA5;color:#fff;border-color:#185FA5;}
.snum.done{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.slbl{font-size:11px;color:#aaa;white-space:nowrap;}
.slbl.active{color:#185FA5;font-weight:700;}
.slbl.done{color:#1D9E75;}
.sline{width:40px;height:2px;background:#e0e4f0;margin-bottom:16px;}
.card{background:#fff;border:1px solid #e8eaf0;border-radius:14px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.slabel{font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:1rem;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ff{grid-column:1/-1;}
.fld{display:flex;flex-direction:column;gap:5px;}
label{font-size:13px;color:#555;font-weight:500;}
input,select,textarea{font-family:inherit;font-size:14px;width:100%;padding:10px 12px;border:1.5px solid #dde0eb;border-radius:9px;background:#fff;color:#1a1a2e;outline:none;transition:border .2s;}
input:focus,select:focus,textarea:focus{border-color:#185FA5;box-shadow:0 0 0 3px rgba(24,95,165,.1);}
textarea{min-height:90px;resize:vertical;line-height:1.5;}
.err{font-size:11px;color:#E24B4A;margin-top:2px;display:none;}
.err.show{display:block;}
.doc-tabs{display:flex;gap:8px;margin-bottom:1rem;}
.doc-tab{font-family:inherit;font-size:13px;font-weight:600;padding:8px 16px;border-radius:8px;cursor:pointer;border:1.5px solid #dde0eb;background:#f4f6fb;color:#888;transition:all .15s;}
.doc-tab.aj{background:#E6F1FB;color:#0C447C;border-color:#85B7EB;}
.doc-tab.ad{background:#E1F5EE;color:#085041;border-color:#5DCAA5;}
.week-nav{display:flex;align-items:center;gap:10px;margin-bottom:1rem;}
.week-lbl{font-size:14px;font-weight:600;color:#1a1a2e;flex:1;text-align:center;}
.btn{font-family:inherit;font-size:13px;font-weight:600;padding:9px 20px;border-radius:9px;cursor:pointer;transition:all .15s;border:1.5px solid #dde0eb;background:transparent;color:#333;}
.btn:hover{background:#f0f2f8;}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-icon{padding:8px 12px;}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5;}
.btn-primary:hover{background:#0C447C;}
.btn-success{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.btn-success:hover{background:#0F6E56;}
.btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:1rem;}
.slots-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;}
.day-col{display:flex;flex-direction:column;gap:4px;}
.day-head{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;text-align:center;padding-bottom:5px;border-bottom:2px solid #eee;}
.day-ds{font-size:10px;color:#aaa;text-align:center;margin-bottom:3px;}
.slot-btn{font-family:inherit;font-size:12px;padding:7px 3px;border-radius:7px;cursor:pointer;border:1.5px solid #e0e4f0;background:#f8f9fc;color:#444;text-align:center;width:100%;transition:all .15s;font-weight:600;}
.slot-btn:hover{border-color:#185FA5;background:#E6F1FB;color:#0C447C;}
.slot-btn.sel-j{background:#E6F1FB;color:#0C447C;border-color:#185FA5;}
.slot-btn.sel-d{background:#E1F5EE;color:#085041;border-color:#1D9E75;}
.no-slot{font-size:11px;color:#ccc;text-align:center;padding:6px 0;}
.no-avail{text-align:center;padding:2rem;color:#888;font-size:14px;background:#f8f9fc;border-radius:10px;line-height:1.7;}
.abox{background:#f8f9fc;border-radius:10px;padding:1.25rem;border:1px solid #eef0f7;}
.ameta{display:flex;align-items:center;gap:8px;font-size:12px;color:#888;margin-bottom:8px;}
.dot-a{width:8px;height:8px;border-radius:50%;background:#378ADD;animation:pulse 1s infinite;flex-shrink:0;}
.dot-ok{width:8px;height:8px;border-radius:50%;background:#1D9E75;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.si{background:#f4f6fb;border-radius:9px;padding:10px 12px;}
.sk{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.05em;font-weight:700;}
.sv{font-size:14px;font-weight:600;color:#1a1a2e;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sf{grid-column:1/-1;}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:999px;}
.bj{background:#E6F1FB;color:#0C447C;}
.bd{background:#E1F5EE;color:#085041;}
.suc{text-align:center;padding:2.5rem 1rem;}
.suc-icon{width:60px;height:60px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;}
.ref{display:inline-block;background:#E6F1FB;color:#185FA5;font-size:13px;font-weight:700;padding:5px 18px;border-radius:999px;margin:.5rem 0 1rem;}
.spinner{width:32px;height:32px;border:3px solid #e0e4f0;border-top:3px solid #185FA5;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{text-align:center;padding:2.5rem;}
@media(max-width:500px){.fg{grid-template-columns:1fr}.slots-grid{grid-template-columns:1fr 1fr}.sg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="topbar">
  <div style="width:32px;height:32px;background:rgba(255,255,255,.2);border-radius:8px;display:flex;align-items:center;justify-content:center">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm0 3v5l3 3" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg>
  </div>
  <span class="topbar-t">Portal de Agendamiento · UNIDA Medicina</span>
  <span class="topbar-s">Coordinación Académica</span>
</div>
<div class="wrap">
  <div class="page-title">Solicitar cita</div>
  <div class="page-sub">Coordinación Académica · Carrera de Medicina</div>
  <div class="steps">
    <div class="step"><div class="snum active" id="sn1">1</div><div class="slbl active" id="sl1">Mis datos</div></div>
    <div class="sline"></div>
    <div class="step"><div class="snum" id="sn2">2</div><div class="slbl" id="sl2">Elegir turno</div></div>
    <div class="sline"></div>
    <div class="step"><div class="snum" id="sn3">3</div><div class="slbl" id="sl3">Análisis</div></div>
    <div class="sline"></div>
    <div class="step"><div class="snum" id="sn4">4</div><div class="slbl" id="sl4">Confirmar</div></div>
  </div>
  <div id="contenido"></div>
</div>

<script>
var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby-3Ps2DWWgUe7J9pefJdCdMcLEETHowBOLGsOmbiQqhJ8C_gunh1XmQ3nvJN6v3Xw/exec';
var DAYS = ['Lunes','Martes','Miercoles','Jueves','Viernes'];
var HOURS = ['07:00','07:30','08:00','08:30','09:00','09:30','10:00','10:30','11:00','11:30','12:00','12:30','13:00','13:30','14:00','14:30','15:00','15:30','16:00','16:30','17:00','17:30','18:00'];
var DOCS = {joel:{name:'Dr. Joel Lopez',role:'Coordinador',cls:'j'}, diego:{name:'Dr. Diego Cantero',role:'Subcoordinador',cls:'d'}};
var TO1 = 'clopez@unida.edu.py';
var TO2 = 'subcoordiacion.medicinacde@unida.edu.py';
var API = 'https://api.anthropic.com/v1/messages';
var MODEL = 'claude-sonnet-4-20250514';

var db = {};
var citas = [];
var studentData = {};
var selectedSlot = null;
var analysisText = '';
var slotWeekOffset = 0;
var slotDocTab = 'joel';
var currentStep = 1;

function escH(s) {
  var e=document.createElement('div');e.appendChild(document.createTextNode(String(s)));return e.innerHTML;
}

function wKey(o) {
  var d = new Date();
  d.setDate(d.getDate() - d.getDay() + 1 + o * 7);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + String(d.getDate()).padStart(2,'0');
}

function wDates(o) {
  var d = new Date();
  d.setDate(d.getDate() - d.getDay() + 1 + o * 7);
  var arr = [];
  for (var i = 0; i < 5; i++) {
    var n = new Date(d);
    n.setDate(d.getDate() + i);
    arr.push(n);
  }
  return arr;
}

function fmt(d) {
  return String(d.getDate()).padStart(2,'0') + '/' + String(d.getMonth()+1).padStart(2,'0');
}

function wLabel(o) {
  var d = wDates(o);
  return fmt(d[0]) + ' - ' + fmt(d[4]) + ' ' + d[0].getFullYear();
}

function getSlots(doc, o) {
  var key = doc + '_' + wKey(o);
  return db[key] || {};
}

function setStepIndicator(n) {
  for (var i = 1; i <= 4; i++) {
    var sn = document.getElementById('sn' + i);
    var sl = document.getElementById('sl' + i);
    if (!sn) continue;
    if (i < n) { sn.className = 'snum done'; sl.className = 'slbl done'; }
    else if (i === n) { sn.className = 'snum active'; sl.className = 'slbl active'; }
    else { sn.className = 'snum'; sl.className = 'slbl'; }
  }
}

function goStep(n) {
  currentStep = n;
  setStepIndicator(n);
  if (n === 1) renderStep1();
  else if (n === 2) renderStep2();
  else if (n === 3) renderStep3();
  else if (n === 4) renderStep4();
  else if (n === 5) renderStep5();
}

function renderStep1() {
  var html = '<div class="card"><div class="slabel">Datos del estudiante</div>'
    + '<div class="fg">'
    + '<div class="fld"><label>Nombre</label><input type="text" id="f-nombre" value="' + escH(studentData.nombre||'') + '" placeholder="Ej: Maria"/><div class="err" id="e-nombre">Ingresa tu nombre</div></div>'
    + '<div class="fld"><label>Apellido</label><input type="text" id="f-apellido" value="' + escH(studentData.apellido||'') + '" placeholder="Ej: Gonzalez"/><div class="err" id="e-apellido">Ingresa tu apellido</div></div>'
    + '<div class="fld"><label>N de matricula</label><input type="text" id="f-matricula" value="' + escH(studentData.matricula||'') + '" placeholder="MED-2024-001"/><div class="err" id="e-matricula">Ingresa tu matricula</div></div>'
    + '<div class="fld"><label>Correo electronico</label><input type="email" id="f-correo" value="' + escH(studentData.correo||'') + '" placeholder="nombre@unida.edu.py"/><div class="err" id="e-correo">Correo invalido</div></div>'
    + '<div class="fld ff"><label>Tema a desarrollar</label><textarea id="f-tema" placeholder="Describe el motivo de la cita...">' + escH(studentData.tema||'') + '</textarea><div class="err" id="e-tema">Describe el tema</div></div>'
    + '</div></div>'
    + '<div class="btn-row"><button class="btn btn-primary" onclick="step1Next()">Elegir turno &rarr;</button></div>';
  document.getElementById('contenido').innerHTML = html;
}

function step1Next() {
  var nombre = document.getElementById('f-nombre').value.trim();
  var apellido = document.getElementById('f-apellido').value.trim();
  var matricula = document.getElementById('f-matricula').value.trim();
  var correo = document.getElementById('f-correo').value.trim();
  var tema = document.getElementById('f-tema').value.trim();
  var ok = true;
  if (!nombre) { document.getElementById('e-nombre').className = 'err show'; ok = false; } else { document.getElementById('e-nombre').className = 'err'; }
  if (!apellido) { document.getElementById('e-apellido').className = 'err show'; ok = false; } else { document.getElementById('e-apellido').className = 'err'; }
  if (!matricula) { document.getElementById('e-matricula').className = 'err show'; ok = false; } else { document.getElementById('e-matricula').className = 'err'; }
  if (!correo || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correo)) { document.getElementById('e-correo').className = 'err show'; ok = false; } else { document.getElementById('e-correo').className = 'err'; }
  if (!tema) { document.getElementById('e-tema').className = 'err show'; ok = false; } else { document.getElementById('e-tema').className = 'err'; }
  if (!ok) return;
  studentData = { nombre: nombre, apellido: apellido, matricula: matricula, correo: correo, tema: tema };
  goStep(2);
}

function renderStep2() {
  document.getElementById('contenido').innerHTML = '<div class="card"><div class="slabel">Selecciona un horario disponible</div><div class="loading"><div class="spinner"></div><p style="color:#aaa;font-size:14px">Cargando horarios...</p></div></div>';
  fetch(SCRIPT_URL + '?action=getDb')
    .then(function(r) { return r.json(); })
    .then(function(j) {
      if (j.ok) db = j.data || {};
      renderSlotsUI();
    })
    .catch(function() {
      renderSlotsUI();
    });
}

function renderSlotsUI() {
  selectedSlot = null;
  var html = '<div class="card"><div class="slabel">Selecciona un horario disponible</div>'
    + '<div class="doc-tabs">'
    + '<button class="doc-tab ' + (slotDocTab==='joel'?'aj':'') + '" id="dtab-joel" onclick="setDoc('joel')">Dr. Joel Lopez</button>'
    + '<button class="doc-tab ' + (slotDocTab==='diego'?'ad':'') + '" id="dtab-diego" onclick="setDoc('diego')">Dr. Diego Cantero</button>'
    + '</div>'
    + '<div class="week-nav"><button class="btn btn-icon" onclick="chW(-1)">&#8592;</button><span class="week-lbl" id="wlbl">' + wLabel(slotWeekOffset) + '</span><button class="btn btn-icon" onclick="chW(1)">&#8594;</button></div>'
    + '<div id="slots-area"></div>'
    + '<div id="sel-info" style="margin-top:.875rem;font-size:13px;color:#888;min-height:18px;"></div>'
    + '</div>'
    + '<div class="btn-row"><button class="btn" onclick="goStep(1)">&#8592; Volver</button><button class="btn btn-primary" id="btn-s2" onclick="goStep(3)" disabled>Analizar tema &rarr;</button></div>';
  document.getElementById('contenido').innerHTML = html;
  renderSlots();
}

function setDoc(doc) {
  slotDocTab = doc;
  var tj = document.getElementById('dtab-joel');
  var td = document.getElementById('dtab-diego');
  if (tj) tj.className = 'doc-tab ' + (doc==='joel'?'aj':'');
  if (td) td.className = 'doc-tab ' + (doc==='diego'?'ad':'');
  renderSlots();
}

function chW(dir) {
  slotWeekOffset += dir;
  var lbl = document.getElementById('wlbl');
  if (lbl) lbl.textContent = wLabel(slotWeekOffset);
  renderSlots();
}

function renderSlots() {
  var area = document.getElementById('slots-area');
  if (!area) return;
  var slots = getSlots(slotDocTab, slotWeekOffset);
  var dates = wDates(slotWeekOffset);
  var dInfo = DOCS[slotDocTab];
  var hasAny = false;
  var html = '<div class="slots-grid">';
  for (var i = 0; i < 5; i++) {
    var dayName = DAYS[i];
    var daySlots = (slots[dayName] || []).filter(function(s) { return !s.occupied; });
    if (daySlots.length) hasAny = true;
    html += '<div class="day-col"><div class="day-head">' + dayName.substring(0,3) + '</div><div class="day-ds">' + fmt(dates[i]) + '</div>';
    if (!daySlots.length) {
      html += '<div class="no-slot">-</div>';
    } else {
      for (var j = 0; j < daySlots.length; j++) {
        var s = daySlots[j];
        var isSel = selectedSlot && selectedSlot.doc===slotDocTab && selectedSlot.day===dayName && selectedSlot.time===s.time && selectedSlot.weekOffset===slotWeekOffset;
        html += '<button class="slot-btn' + (isSel?' sel-'+dInfo.cls:'') + '" onclick="pickSlot('' + slotDocTab + '','' + dayName + '','' + s.time + '',' + slotWeekOffset + ','' + fmt(dates[i]) + '')">' + s.time + '</button>';
      }
    }
    html += '</div>';
  }
  html += '</div>';
  if (!hasAny) html = '<div class="no-avail">No hay horarios disponibles esta semana.<br>Proba la semana siguiente o el otro profesional.</div>';
  area.innerHTML = html;
}

function pickSlot(doc, day, time, weekOffset, dateStr) {
  selectedSlot = { doc: doc, day: day, time: time, weekOffset: weekOffset, dateStr: dateStr };
  var info = document.getElementById('sel-info');
  if (info) info.innerHTML = 'Turno seleccionado: <strong>' + DOCS[doc].name + '</strong> &mdash; ' + day + ' ' + dateStr + ' a las <strong>' + time + '</strong>';
  var btn = document.getElementById('btn-s2');
  if (btn) btn.disabled = false;
  renderSlots();
}

function renderStep3() {
  document.getElementById('contenido').innerHTML = '<div class="card"><div class="slabel">Analisis del tema</div><div class="abox"><div class="ameta"><div class="dot-a" id="adot"></div><span id="a-status">Analizando tu solicitud...</span></div><div id="a-text" style="font-size:14px;line-height:1.7;color:#333;white-space:pre-wrap;margin-top:5px;"></div></div></div><div class="btn-row"><button class="btn" onclick="goStep(2)">&#8592; Volver</button><button class="btn btn-primary" id="btn-s3" onclick="goStep(4)" disabled>Confirmar cita &rarr;</button></div>';
  fetch(API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: MODEL,
      max_tokens: 1000,
      system: 'Eres el asistente de la Coordinacion Academica de la carrera de Medicina de la UNIDA, Paraguay. Analiza en 3-5 oraciones el tema del estudiante. Indica si es pertinente para la coordinacion, que documentos necesitaria traer y cualquier observacion util. Se profesional y empatico. Responde en espanol.',
      messages: [{ role: 'user', content: 'Estudiante: ' + studentData.nombre + ' ' + studentData.apellido + '. Tema: "' + studentData.tema + '". Cita con ' + DOCS[selectedSlot.doc].name + ' el ' + selectedSlot.day + ' ' + selectedSlot.dateStr + ' a las ' + selectedSlot.time + '.' }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    var texts = (data.content || []).filter(function(b) { return b.type === 'text'; }).map(function(b) { return b.text; });
    analysisText = texts.join('\n') || 'No se pudo obtener analisis.';
    var adot = document.getElementById('adot'); if (adot) adot.className = 'dot-ok';
    var ast = document.getElementById('a-status'); if (ast) ast.textContent = 'Analisis completado';
    var at = document.getElementById('a-text'); if (at) at.textContent = analysisText;
    var btn = document.getElementById('btn-s3'); if (btn) btn.disabled = false;
  })
  .catch(function() {
    analysisText = 'No se pudo conectar al servicio. Podes continuar de todas formas.';
    var adot = document.getElementById('adot'); if (adot) adot.className = 'dot-ok';
    var ast = document.getElementById('a-status'); if (ast) ast.textContent = 'Analisis no disponible';
    var at = document.getElementById('a-text'); if (at) at.textContent = analysisText;
    var btn = document.getElementById('btn-s3'); if (btn) btn.disabled = false;
  });
}

function renderStep4() {
  var dInfo = DOCS[selectedSlot.doc];
  var html = '<div class="card"><div class="slabel">Resumen de la solicitud</div>'
    + '<div class="sg">'
    + '<div class="si"><div class="sk">Nombre completo</div><div class="sv">' + escH(studentData.nombre + ' ' + studentData.apellido) + '</div></div>'
    + '<div class="si"><div class="sk">N de matricula</div><div class="sv">' + escH(studentData.matricula) + '</div></div>'
    + '<div class="si sf"><div class="sk">Correo electronico</div><div class="sv">' + escH(studentData.correo) + '</div></div>'
    + '<div class="si sf"><div class="sk">Tema a tratar</div><div class="sv" style="white-space:normal;line-height:1.4">' + escH(studentData.tema) + '</div></div>'
    + '<div class="si"><div class="sk">Profesional</div><div class="sv"><span class="badge b' + dInfo.cls + '">' + dInfo.name + '</span></div></div>'
    + '<div class="si"><div class="sk">Turno</div><div class="sv">' + selectedSlot.day + ' ' + selectedSlot.dateStr + ' - ' + selectedSlot.time + '</div></div>'
    + '</div>'
    + '<div class="abox"><div class="ameta"><div class="dot-ok"></div><span style="font-size:12px;color:#888">Analisis previo del tema</span></div>'
    + '<div style="font-size:14px;line-height:1.6;color:#333;margin-top:5px">' + escH(analysisText) + '</div></div></div>'
    + '<div class="btn-row"><button class="btn" onclick="goStep(3)">&#8592; Volver</button><button class="btn btn-success" onclick="confirmar()">Confirmar y enviar &#10003;</button></div>';
  document.getElementById('contenido').innerHTML = html;
}

function confirmar() {
  var slots = getSlots(selectedSlot.doc, selectedSlot.weekOffset);
  var daySlots = slots[selectedSlot.day] || [];
  for (var i = 0; i < daySlots.length; i++) {
    if (daySlots[i].time === selectedSlot.time) { daySlots[i].occupied = true; break; }
  }
  slots[selectedSlot.day] = daySlots;
  db[selectedSlot.doc + '_' + wKey(selectedSlot.weekOffset)] = slots;
  var ref = 'CIT-' + String(Date.now()).slice(-6);
  var cita = {
    ref: ref, doc: selectedSlot.doc,
    nombre: studentData.nombre, apellido: studentData.apellido,
    matricula: studentData.matricula, correo: studentData.correo,
    tema: studentData.tema, day: selectedSlot.day,
    dateStr: selectedSlot.dateStr, time: selectedSlot.time,
    weekLabel: wLabel(selectedSlot.weekOffset),
    analysis: analysisText, createdAt: new Date().toISOString()
  };
  citas.push(cita);
  fetch(SCRIPT_URL + '?action=saveDb&data=' + encodeURIComponent(JSON.stringify(db)));
  fetch(SCRIPT_URL + '?action=saveCita&cita=' + encodeURIComponent(JSON.stringify(cita)));
  goStep(5);
}

function renderStep5() {
  var dInfo = DOCS[selectedSlot.doc];
  var last = citas[citas.length - 1];
  var html = '<div class="card"><div class="suc">'
    + '<div class="suc-icon"><svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="13" stroke="#1D9E75" stroke-width="2"/><path d="M8 14l4 4 8-8" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
    + '<h2 style="font-size:20px;font-weight:700;color:#1D9E75;margin-bottom:6px">Cita confirmada!</h2>'
    + '<div class="ref">' + (last ? last.ref : 'CIT-000000') + '</div>'
    + '<p style="font-size:14px;color:#666;line-height:1.7;max-width:400px;margin:0 auto .75rem">Cita con <strong>' + dInfo.name + '</strong> el <strong>' + selectedSlot.day + ' ' + selectedSlot.dateStr + '</strong> a las <strong>' + selectedSlot.time + '</strong>.<br>La coordinacion fue notificada.</p>'
    + '<p style="font-size:13px;color:#aaa">Confirmacion a <strong>' + escH(studentData.correo) + '</strong></p>'
    + '<div class="btn-row" style="justify-content:center;margin-top:1.5rem"><button class="btn btn-primary" onclick="location.reload()">Solicitar otra cita</button></div>'
    + '</div></div>';
  document.getElementById('contenido').innerHTML = html;
}

goStep(1);
</script>
</body>
</html>
